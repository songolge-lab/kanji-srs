name: Windows EXE Derle

# Bu workflow, "electron" klasöründeki kodu GitHub'ın kendi
# Windows sunucusunda derler. İki şey yapar:
#  1. Sana indirilebilir bir .exe / kurulum dosyası üretir (Artifacts).
#  2. AYRICA bunu otomatik olarak bir GitHub Release TASLAĞI (draft)
#     olarak yayınlar — bu, kurulu uygulamalardaki "otomatik
#     güncelleme" özelliğinin çalışması için gereklidir.
#
# Senin bilgisayarında HİÇBİR ŞEY kurmana gerek yoktur.
#
# YENİ SÜRÜM ÇIKARMAK İSTEDİĞİNDE (örn. yeni bir özellik):
#  1. electron/package.json içindeki "version" değerini artır
#     (örn. "1.0.0" -> "1.0.1"). BU ADIM ZORUNLU, atlarsan
#     güncelleme kontrolü yeni sürümü "aynı" sayıp atlar.
#  2. Değişiklikleri GitHub'a yükle (web/index.html, electron/web/index.html, vs.)
#  3. GitHub'da "Actions" sekmesine gir.
#  4. Soldaki listede "Windows EXE Derle" işine tıkla.
#  5. Sağ üstte "Run workflow" butonuna bas, tekrar "Run workflow" de.
#  6. ~3-5 dakika bekle, yeşil tik çıkınca işin üstüne tıkla.
#  7. Repo sayfasında "Releases" sekmesine gir, oluşan TASLAK
#     (draft) sürümü bul, "Edit" -> "Publish release" de.
#     (Bu adım taslağı yayına alır; yayına alınmadan kurulu
#     uygulamalar güncellemeyi göremez.)
#  8. Kurulu uygulamalar birkaç dakika içinde (veya açılışta)
#     güncellemeyi otomatik fark edip indirecek.

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bağımlılıkları yükle
        working-directory: electron
        run: npm install

      - name: Windows .exe derle ve GitHub Release taslağı oluştur
        working-directory: electron
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Derlenen dosyaları yükle (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: kanji-srs-windows
          path: |
            electron/dist/*.exe
          if-no-files-found: error
